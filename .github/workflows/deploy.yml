name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy files via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          # Sync only necessary source folders and root files
          source: "server/,pages/,components/,assets/,public/,scripts/,middleware/,types/,drizzle/,package.json,package-lock.json,Dockerfile,compose.yml,app.vue,drizzle.config.ts,tsconfig.json"
          target: "~/docker/shopping-list"
          rm: false
          strip_components: 0
          overwrite: true

      - name: Restart Application via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/docker/shopping-list
            echo "--- Persistence Check ---"
            ls -al .env data/ sqlite.db 2>/dev/null || echo "Warning: Some config/data files missing!"
            echo "--- Deployment Sync Check ---"
            find server/api -name "debug.get.ts"
            echo "-------------------------"
            echo "Building and restarting containers..."
            docker compose up -d --build
            echo "Deployment finished successfully."
