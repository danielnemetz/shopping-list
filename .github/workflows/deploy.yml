name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via Rsync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Configure SSH to use the bastion host automatically
          cat >> ~/.ssh/config <<EOF
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ${{ secrets.BASTION_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no

          Host target
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/id_rsa
            ProxyCommand ssh bastion -W %h:%p
            StrictHostKeyChecking no
          EOF

          # Sync files robustly
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.output' \
            --exclude '.nuxt' \
            --exclude 'sqlite.db' \
            --exclude '.env' \
            --exclude 'data' \
            --exclude 'compose.local.yml' \
            ./ target:~/docker/shopping-list/

      - name: Restart Application via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/docker/shopping-list
            
            echo "--- Environment & Network Check ---"
            if [ -f .env ]; then
              # Export variables from .env
              export $(grep -v '^#' .env | xargs)
              echo "Loaded variables from .env"
            fi
            
            # Diagnostic: List networks to see what's available
            docker network ls
            
            # Fallback for critical variables if still missing
            export TRAEFIK_NETWORK=${TRAEFIK_NETWORK:-traefik-proxy}
            export APP_DOMAIN=${APP_DOMAIN:-listly.nemetz.de}
            
            echo "Using TRAEFIK_NETWORK: $TRAEFIK_NETWORK"
            
            echo "--- Source File Check ---"
            grep "version" server/api/debug.get.ts
            
            echo "Building containers (no-cache)..."
            docker compose build --no-cache
            
            echo "Restarting containers..."
            # Note: We use the variables exported in this shell
            docker compose up -d --force-recreate
            
            echo "--- Container Status ---"
            docker ps --filter name=listly-app
            echo "Deployment finished successfully."
